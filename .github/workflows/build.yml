name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk cmake ninja-build \
            autoconf automake libtool libtool-bin libltdl-dev autoconf-archive \
            build-essential pkg-config \
            libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with buildozer
        run: |
          yes | buildozer -v android debug 2>&1 | tee build_full.log
          echo "===== ERROR SUMMARY ====="
          grep -i -E "error|failed|not found|traceback" build_full.log | tail -n 40

      - name: Upload full log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: build_full.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kocina-del-mundo-apk
          path: bin/*.apk