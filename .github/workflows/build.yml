name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake ninja-build

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with buildozer
        shell: bash
        run: |
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee build_full.log

      - name: Show error summary
        if: always()
        run: |
          echo "===== ERROR SUMMARY ====="
          grep -i -E "error|failed|not found|traceback" build_full.log | tail -n 60 || echo "No obvious error lines found — check full log."

      - name: Upload full log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: build_full.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kocina-del-mundo-apk
          path: bin/*.apk
